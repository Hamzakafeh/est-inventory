<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EST-IMS® — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg-deep:#0d1117;--bg-main:#161b22;--bg-panel:#1c2230;--bg-card:#21283a;
    --border:#2d3748;--border-light:#3d4f6a;--accent-blue:#3b82f6;--accent-cyan:#06b6d4;
    --accent-red:#ef4444;--text-main:#e2e8f0;--text-muted:#8b9db8;--text-dim:#4a5568;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--bg-deep);color:var(--text-main);min-height:100vh;display:flex;flex-direction:column;}
  .topbar{background:var(--bg-main);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;}
  .topbar-brand{display:flex;align-items:center;gap:12px;}
  .brand-icon{width:38px;height:38px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(255,255,255,.25);}
  .brand-text h1{font-size:15px;font-weight:600;letter-spacing:.3px;}
  .brand-text p{font-size:11px;color:var(--text-muted);margin-top:1px;}
  .clock{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted);letter-spacing:1px;}
  .login-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
  .login-card{background:var(--bg-panel);border:1px solid var(--border-light);border-radius:18px;padding:44px 48px;width:100%;max-width:400px;box-shadow:0 12px 48px rgba(0,0,0,.7);animation:cardIn .28s cubic-bezier(.34,1.56,.64,1);}
  @keyframes cardIn{from{opacity:0;transform:scale(.92) translateY(16px);}to{opacity:1;transform:scale(1) translateY(0);}}
  .login-logo{width:64px;height:64px;margin:0 auto 24px;border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(59,130,246,.35);overflow:hidden;}
  .login-logo img{width:100%;height:100%;object-fit:contain;border-radius:16px;}
  .login-title{text-align:center;font-size:18px;font-weight:700;margin-bottom:4px;}
  .login-subtitle{text-align:center;font-size:11px;color:var(--accent-cyan);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:32px;}
  .divider{height:1px;background:var(--border);margin-bottom:28px;}
  .field-label{display:block;font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
  .field-wrap{position:relative;margin-bottom:18px;}
  .field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;display:flex;align-items:center;}
  .field-wrap input{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:11px 14px 11px 40px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text-main);outline:none;transition:border-color .18s,box-shadow .18s;}
  .field-wrap input::placeholder{color:var(--text-dim);}
  .field-wrap input:focus{border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
  .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-dim);display:flex;align-items:center;transition:color .15s;}
  .pw-toggle:hover{color:var(--text-muted);}
  .btn-login{width:100%;padding:12px;background:var(--accent-blue);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
  .btn-login:hover:not(:disabled){background:#2563eb;transform:translateY(-1px);box-shadow:0 4px 16px rgba(59,130,246,.4);}
  .btn-login:disabled{opacity:.55;cursor:not-allowed;}
  .error-box{display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);border-radius:9px;padding:10px 14px;margin-bottom:18px;font-size:12px;color:#fca5a5;align-items:center;gap:8px;}
  .version-tag{display:block;text-align:center;margin-top:24px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-icon">
      <img src="est.ico" style="width:26px;height:26px;object-fit:contain;" onerror="this.style.display='none';this.parentElement.textContent='📦'">
    </div>
    <div class="brand-text">
      <h1>EST Inventory System</h1>
      <p>Alestesharia Animal Nutrition</p>
    </div>
  </div>
  <span class="clock" id="clock">--:-- --</span>
</div>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <img src="low.ico" onerror="this.style.display='none'">
    </div>
    <div class="login-title">EST Inventory System</div>
    <div class="login-subtitle">Secure Access — View Only</div>
    <div class="divider"></div>

    <div class="error-box" id="errorBox">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorMsg">اسم المستخدم أو كلمة المرور غير صحيحة</span>
    </div>

    <label class="field-label">Username</label>
    <div class="field-wrap">
      <span class="field-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </span>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" autofocus>
    </div>

    <label class="field-label">Password</label>
    <div class="field-wrap">
      <span class="field-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </span>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
      <button class="pw-toggle" type="button" id="pwToggle" title="Show/hide password">
        <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span id="btnText">Sign In</span>
    </button>
    <span class="version-tag">v2.0 — 2026 · View Only</span>
  </div>
</div>

<script>
// ── بيانات الدخول للعرض فقط ─────────────────────────────────────
// هذه النسخة للعرض فقط، يمكنك تغيير كلمة المرور هنا
const VIEW_USERS = {
  'Admin': 'EST2026',
};
// ─────────────────────────────────────────────────────────────────

function updateClock(){
  const now=new Date();
  const d=now.toISOString().split('T')[0];
  const t=now.toLocaleTimeString('en-US',{hour12:true,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('clock').textContent=d+'  '+t;
}
setInterval(updateClock,1000); updateClock();

document.getElementById('pwToggle').addEventListener('click',function(){
  const inp=document.getElementById('password');
  const icon=document.getElementById('eyeIcon');
  if(inp.type==='password'){
    inp.type='text';
    icon.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  }else{
    inp.type='password';
    icon.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
});

document.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

function doLogin(){
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value.trim();
  const errorBox=document.getElementById('errorBox');
  const btnText=document.getElementById('btnText');
  const loginBtn=document.getElementById('loginBtn');

  errorBox.style.display='none';
  if(!username||!password){ showError('يرجى إدخال اسم المستخدم وكلمة المرور'); return; }

  btnText.textContent='Signing in...';
  loginBtn.disabled=true;

  setTimeout(()=>{
    if(VIEW_USERS[username]===password){
      sessionStorage.setItem('est_auth','1');
      sessionStorage.setItem('est_user',username);
      btnText.textContent='✓ Success';
      setTimeout(()=>{ window.location.href='index.html'; },300);
    }else{
      showError('اسم المستخدم أو كلمة المرور غير صحيحة');
      btnText.textContent='Sign In';
      loginBtn.disabled=false;
    }
  },400);
}

function showError(msg){
  const box=document.getElementById('errorBox');
  document.getElementById('errorMsg').textContent=msg;
  box.style.display='flex';
}
</script>
</body>
</html>
