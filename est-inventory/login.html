  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  /* ── DARK (default) ── */
  :root {
    --bg-deep:      #0d1117;
    --bg-main:      #161b22;
    --bg-panel:     #1c2230;
    --bg-card:      #21283a;
    --bg-hover:     #2a3347;
    --border:       #2d3748;
    --border-light: #3d4f6a;
    --accent-blue:  #3b82f6;
    --accent-cyan:  #06b6d4;
    --accent-green: #10b981;
    --accent-red:   #ef4444;
    --text-main:    #e2e8f0;
    --text-muted:   #8b9db8;
    --text-dim:     #4a5568;
    --shadow:       0 4px 24px rgba(0,0,0,0.4);
    --card-shadow:  0 12px 48px rgba(0,0,0,0.7);
  }

  /* ── LIGHT ── */
  html.light {
    --bg-deep:      #f0f4f8;
    --bg-main:      #ffffff;
    --bg-panel:     #ffffff;
    --bg-card:      #f8fafc;
    --bg-hover:     #e8edf5;
    --border:       #d1dae8;
    --border-light: #b8c6da;
    --accent-blue:  #2563eb;
    --accent-cyan:  #0891b2;
    --accent-green: #059669;
    --accent-red:   #dc2626;
    --text-main:    #1a2332;
    --text-muted:   #4a6080;
    --text-dim:     #8fa3be;
    --shadow:       0 4px 24px rgba(0,0,0,0.08);
    --card-shadow:  0 12px 48px rgba(0,0,0,0.10);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-deep);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.25s, color 0.25s;
    position: relative;
    overflow: hidden;
  }

  /* TOP BAR */
  .topbar, .login-wrapper { position: relative; z-index: 1; }
  .topbar {
    background: var(--bg-main);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    transition: background 0.25s, border-color 0.25s;
  }
  .topbar-brand { display: flex; align-items: center; gap: 12px; }
  .brand-icon {
    width: 38px; height: 38px;
    background: #ffffff;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 2px 12px rgba(255,255,255,0.25);
  }
  html.light .brand-icon {
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    border: 1px solid var(--border);
  }
  .brand-text h1 { font-size: 15px; font-weight: 600; color: var(--text-main); letter-spacing: 0.3px; }
  .brand-text p  { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  /* topbar right side */
  .topbar-right { display: flex; align-items: center; gap: 14px; }

  .clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--text-muted); letter-spacing: 1px;
  }

  /* ── THEME TOGGLE BUTTON ── */
  .theme-btn {
    width: 36px; height: 36px;
    border-radius: 9px;
    border: 1px solid var(--border-light);
    background: var(--bg-card);
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.15s;
    flex-shrink: 0;
  }
  .theme-btn:hover {
    background: var(--bg-hover);
    color: var(--text-main);
    transform: rotate(15deg);
  }
  .theme-btn svg { transition: transform 0.3s; }

  /* icons: show sun in dark, moon in light */
  .theme-btn .icon-sun  { display: block; }
  .theme-btn .icon-moon { display: none;  }
  html.light .theme-btn .icon-sun  { display: none;  }
  html.light .theme-btn .icon-moon { display: block; }

  /* CENTER LOGIN CARD */
  .login-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .login-card {
    background: var(--bg-panel);
    border: 1px solid var(--border-light);
    border-radius: 18px;
    padding: 44px 48px;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--card-shadow);
    animation: cardIn 0.28s cubic-bezier(.34,1.56,.64,1);
    transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
  }
  @keyframes cardIn {
    from { opacity:0; transform: scale(0.92) translateY(16px); }
    to   { opacity:1; transform: scale(1)    translateY(0);    }
  }

  .login-logo {
    width: 64px; height: 64px;
    margin: 0 auto 24px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(59,130,246,0.35);
    overflow: hidden;
  }
  .login-logo img { width:100%; height:100%; object-fit:contain; border-radius:16px; }

  .login-title {
    text-align: center;
    font-size: 18px; font-weight: 700;
    color: var(--text-main);
    margin-bottom: 4px;
  }
  .login-subtitle {
    text-align: center;
    font-size: 11px; color: var(--accent-cyan);
    letter-spacing: 1.2px; text-transform: uppercase;
    margin-bottom: 32px;
  }

  .divider { height:1px; background: var(--border); margin-bottom: 28px; transition: background 0.25s; }

  .field-label {
    display: block;
    font-size: 11px; font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.8px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .field-wrap {
    position: relative;
    margin-bottom: 18px;
  }
  .field-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim); pointer-events: none;
    display: flex; align-items: center;
  }
  .field-wrap input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px 11px 40px;
    font-family: 'Inter', sans-serif;
    font-size: 13px; color: var(--text-main);
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s, background 0.25s, color 0.25s;
  }
  .field-wrap input::placeholder { color: var(--text-dim); }
  .field-wrap input:focus {
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  html.light .field-wrap input:focus {
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  }

  /* password toggle */
  .pw-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); display: flex; align-items: center;
    transition: color 0.15s;
  }
  .pw-toggle:hover { color: var(--text-muted); }

  .btn-login {
    width: 100%;
    padding: 12px;
    background: var(--accent-blue);
    color: #fff;
    border: none; border-radius: 10px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 8px;
  }
  .btn-login:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(59,130,246,0.4); }
  .btn-login:active:not(:disabled) { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.55; cursor: not-allowed; }

  /* error box */
  .error-box {
    display: none;
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.35);
    border-radius: 9px;
    padding: 10px 14px;
    margin-bottom: 18px;
    font-size: 12px; color: #ef4444;
    display: flex; align-items: center; gap: 8px;
  }
  html:not(.light) .error-box { color: #fca5a5; }
  .error-box.hidden { display: none !important; }

  /* spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .version-tag {
    display: block; text-align: center;
    margin-top: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-dim);
  }
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg-image"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-icon">
      <img src="/static/est.ico" style="width:26px;height:26px;object-fit:contain;" onerror="this.style.display='none';this.parentElement.textContent='📦'">
    </div>
    <div class="brand-text">
      <h1>EST Inventory System</h1>
      <p>Alestesharia Animal Nutrition</p>
    </div>
  </div>

  <div class="topbar-right">
    <!-- Theme Toggle -->
    <button class="theme-btn" id="themeBtn" title="Toggle light/dark mode">
      <!-- Sun icon (shown in dark mode) -->
      <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <!-- Moon icon (shown in light mode) -->
      <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    <span class="clock" id="clock">--:-- --</span>
  </div>
</div>

<!-- LOGIN CARD -->
<div class="login-wrapper">
  <div class="login-card">

    <div class="login-logo">
      <img src="/static/low.ico" onerror="this.style.display='none'">
    </div>

    <div class="login-title">EST Inventory System</div>
    <div class="login-subtitle">Secure Access</div>
    <div class="divider"></div>

    <!-- Error -->
    <div class="error-box hidden" id="errorBox">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorMsg">اسم المستخدم أو كلمة المرور غير صحيحة</span>
    </div>

    <!-- Username -->
    <label class="field-label">Username</label>
    <div class="field-wrap">
      <span class="field-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </span>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" autofocus>
    </div>

    <!-- Password -->
    <label class="field-label">Password</label>
    <div class="field-wrap">
      <span class="field-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </span>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
      <button class="pw-toggle" type="button" id="pwToggle" title="Show/hide password">
        <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <!-- Submit -->
    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">Sign In</span>
    </button>

    <span class="version-tag">v2.0 — 2026</span>
  </div>
</div>

<script>
// ── THEME ──
(function() {
  const saved = localStorage.getItem('est-theme');
  if (saved === 'light') document.documentElement.classList.add('light');
})();

document.getElementById('themeBtn').addEventListener('click', function() {
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('est-theme', isLight ? 'light' : 'dark');
});

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  const d = now.toISOString().split('T')[0];
  const t = now.toLocaleTimeString('en-US', { hour12:true, hour:'2-digit', minute:'2-digit', second:'2-digit' });
  document.getElementById('clock').textContent = d + '  ' + t;
}
setInterval(updateClock, 1000);
updateClock();

// ── PASSWORD TOGGLE ──
document.getElementById('pwToggle').addEventListener('click', function() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
});

// ── ENTER KEY ──
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

// ── LOGIN ──
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorBox = document.getElementById('errorBox');
  const spinner  = document.getElementById('spinner');
  const btnText  = document.getElementById('btnText');
  const loginBtn = document.getElementById('loginBtn');

  errorBox.classList.add('hidden');

  if (!username || !password) {
    showError('يرجى إدخال اسم المستخدم وكلمة المرور');
    return;
  }

  spinner.style.display = 'block';
  btnText.textContent = 'Signing in...';
  loginBtn.disabled = true;

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
      btnText.textContent = '✓ Success';
      spinner.style.display = 'none';
      setTimeout(() => { window.location.href = '/'; }, 300);
    } else {
      showError(data.message || 'اسم المستخدم أو كلمة المرور غير صحيحة');
      resetBtn();
    }
  } catch(e) {
    showError('Connection error. Please try again.');
    resetBtn();
  }
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  document.getElementById('errorMsg').textContent = msg;
  box.classList.remove('hidden');
  box.style.display = 'flex';
}

function resetBtn() {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('btnText').textContent = 'Sign In';
  document.getElementById('loginBtn').disabled = false;
}
</script>
</body>
</html>
